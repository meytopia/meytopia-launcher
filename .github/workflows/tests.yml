# Meytopia launcher — filet de tests (anti-régression)
# À chaque push/PR : syntaxe du renderer + tests des fonctions pures de la page Communauté
# (sources de données, exclusion des joueurs privés, jalons, sessions, formats, pouls).
# Croix rouge AVANT qu'une release ne parte chez les joueurs.
name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntaxe du renderer
        run: node --check src/renderer/js/app.js
      - name: Tests fonctions pures (page Communauté)
        run: node tools/launcher-test.js
